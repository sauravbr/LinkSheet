name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions tab

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      # This builds the unsigned release APK. 
      # If your build flavor setup requires a specific flavor task (like assembleProRelease), you can change this.
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinkSheet-Release-APK
          path: app/build/outputs/apk/*/release/*.apk
          retention-days: 7
          
